{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Add Game Account</h2>

<form method="POST">

<p>Game Name</p>
<input type="text" name="game_name">

<a href="/dashboard">
<button type="button">Back</button>
</a>

</form>

</div>

{% endblock %}
